version: "2"
linters:
  default: all
  disable:
    - depguard
    - dupl
    - exhaustruct
    - forbidigo
    - funlen
    - gochecknoglobals
    - godot
    - godox
    - ireturn
    - tagliatelle
    - testpackage
    - varnamelen
    - gomoddirectives
    - wrapcheck
    - wsl
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      disable-default-exclusions: true
      exclude-functions:
        - "(*strings.Builder).WriteString"
        - "(*strings.Builder).Write"
    exhaustive:
      default-signifies-exhaustive: true
    tagalign:
      align: true
      sort: true
      strict: true
    revive:
      severity: warning
      # Rules that need project-specific config (skipped):
      #   add-constant        — too noisy without tuning
      #   banned-characters   — needs list of banned chars
      #   comments-density    — too noisy without tuning
      #   file-header         — needs header template
      #   imports-blocklist   — needs list of blocked packages
      #   max-public-structs  — too restrictive without context
      #   string-format       — needs regex patterns
      rules:
        - name: atomic
        - name: bare-return
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: call-to-gc
        - name: comment-spacings
        - name: cognitive-complexity
          arguments: [11]
        - name: confusing-results
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: cyclomatic
          arguments: [11]
        - name: datarace
        - name: deep-exit
        - name: defer
        - name: dot-imports
        - name: duplicated-imports
        - name: early-return
        - name: empty-block
        - name: empty-lines
        - name: enforce-map-style
          arguments: ["make"]
        - name: enforce-repeated-arg-type-style
          arguments: ["short"]
        - name: enforce-slice-style
          arguments: ["make"]
        - name: enforce-switch-style
        - name: epoch-naming
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: file-length-limit
          arguments:
            - max: 800
        - name: filename-format
        - name: flag-parameter
        - name: function-length
          arguments: [60, 100]
        - name: function-result-limit
          arguments: [3]
        - name: get-return
        - name: identical-branches
        - name: identical-ifelseif-branches
        - name: identical-ifelseif-conditions
        - name: identical-switch-branches
        - name: identical-switch-conditions
        - name: if-return
        - name: import-alias-naming
          arguments: ["^[a-z][a-zA-Z0-9]*$"]
        - name: import-shadowing
        - name: increment-decrement
        - name: indent-error-flow
        - name: inefficient-map-lookup
        - name: line-length-limit
          arguments: [150]
        - name: max-control-nesting
          arguments: [5]
        - name: modifies-parameter
        - name: modifies-value-receiver
        - name: nested-structs
        - name: optimize-operands-order
        - name: package-comments
        - name: package-directory-mismatch
        - name: range
        - name: range-val-address
        - name: range-val-in-closure
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: redundant-build-tag
        - name: redundant-import-alias
        - name: redundant-test-main-exit
        - name: string-of-int
        - name: struct-tag
        - name: superfluous-else
        - name: time-date
        - name: time-equal
        - name: time-naming
        - name: unchecked-type-assertion
        - name: unconditional-recursion
        - name: unexported-naming
        - name: unexported-return
        - name: unhandled-error
          arguments:
            - "fmt.Print.*"
            - "fmt.Fprint.*"
            - "strings.Builder.Write.*"
            - "(net/http.ResponseWriter).Write"
            - "(net.Conn).Close"
        - name: unnecessary-format
        - name: unnecessary-if
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: use-any
        - name: use-errors-new
        - name: use-fmt-print
        - name: use-slices-sort
        - name: useless-break
        - name: useless-fallthrough
        - name: var-declaration
        - name: var-naming
        - name: waitgroup-by-value
    godoclint:
      default: all
      options:
        max-len:
          length: 120
        require-doc:
          ignore-exported: false
          ignore-unexported: true
        start-with-name:
          include-unexported: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        text: "G204"
        path: "_test\\.go$"
      - linters:
          - godoclint
        text: "symbol should have a godoc"
        path: "_test\\.go$"
      - linters:
          - errcheck
        path: "example_test\\.go$"
      - linters:
          - testableexamples
        path: "example_test\\.go$"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
    - golines
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
